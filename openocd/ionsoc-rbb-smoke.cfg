# Non-interactive OpenOCD smoke for the Verilator remote-bitbang server.
#
# It verifies TAP examine, halt/resume, register access, and SBA/sysbus memory
# access through the Debug Module.

source [find openocd/ionsoc-rbb-base.cfg]

init
halt
reg pc

# Verify Debug Module SBA/sysbus access with explicit DMI operations. This
# keeps the smoke deterministic while program buffer support is intentionally
# absent and OpenOCD's high-level memory helper may try extra fallback paths.
proc wait_sba_idle {} {
    for {set i 0} {$i < 100} {incr i} {
        set sbcs [riscv dmi_read 0x38]
        if {($sbcs & 0x00200000) == 0} {
            return $sbcs
        }
        sleep 1
    }
    echo "ION_OPENOCD_SBA_TIMEOUT"
    shutdown error
}

riscv dmi_write 0x38 0x00050000
riscv dmi_write 0x39 0x10000000
riscv dmi_write 0x3c 0x12345678
set sbcs [wait_sba_idle]
if {($sbcs & 0x00007000) != 0} {
    echo [format "ION_OPENOCD_SBA_FAIL write sbcs=0x%08x" $sbcs]
    shutdown error
}

riscv dmi_write 0x38 0x00150000
riscv dmi_write 0x39 0x10000000
set sbcs [wait_sba_idle]
if {($sbcs & 0x00007000) != 0} {
    echo [format "ION_OPENOCD_SBA_FAIL read sbcs=0x%08x" $sbcs]
    shutdown error
}
set sba_value [riscv dmi_read 0x3c]
if {$sba_value != 0x12345678} {
    echo [format "ION_OPENOCD_SBA_FAIL expected=0x12345678 actual=0x%08x" $sba_value]
    shutdown error
}
echo "ION_OPENOCD_SBA_OK"

# IonCacheCtl is an IonSoC private Debug Module register, not a RISC-V Debug
# Spec register. It lets OpenOCD/SBA flows request cache maintenance after
# sysbus writes without running target code.
proc wait_ion_cache_done {} {
    for {set i 0} {$i < 200} {incr i} {
        set ctl [riscv dmi_read 0x70]
        if {($ctl & 0x00030000) != 0} {
            echo [format "ION_OPENOCD_CACHE_FAIL ctl=0x%08x" $ctl]
            shutdown error
        }
        if {($ctl & 0x00000300) == 0x00000300} {
            return $ctl
        }
        sleep 1
    }
    echo "ION_OPENOCD_CACHE_TIMEOUT"
    shutdown error
}

riscv dmi_write 0x70 0x00030300
riscv dmi_write 0x70 0x00000003
set cache_ctl [wait_ion_cache_done]
echo [format "ION_OPENOCD_CACHE_OK ctl=0x%08x" $cache_ctl]
riscv dmi_write 0x70 0x00030300

resume
shutdown
