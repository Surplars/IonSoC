# IonSoC Verilator remote-bitbang base configuration.
#
# This file only declares the adapter, TAP, and RISC-V target. Scenario files
# decide whether to halt, resume, or run memory-access smoke commands.

adapter driver remote_bitbang
remote_bitbang host 127.0.0.1
remote_bitbang port 9824

transport select jtag
adapter speed 1000

set _CHIPNAME ionsoc
jtag newtap $_CHIPNAME cpu -irlen 5 -expected-id 0x10e31913

target create $_CHIPNAME.cpu riscv -chain-position $_CHIPNAME.cpu -coreid 0
$_CHIPNAME.cpu configure -work-area-phys 0x10000000 -work-area-size 0x1000 -work-area-backup 0

riscv set_command_timeout_sec 10
riscv set_mem_access sysbus abstract
